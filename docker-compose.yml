services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: campus_assistant_backend
    ports:
      - "8001:8000"
    env_file:
      - ./.env
    volumes:
      - ./backend:/app
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campus_assistant_frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: always